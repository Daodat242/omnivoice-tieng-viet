name: Sync to HuggingFace

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          git remote add hf https://oauth2:${HF_TOKEN}@huggingface.co/spaces/Daodat242/omnivoice-tieng-viet.git
          git push hf main --force
